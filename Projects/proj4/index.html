<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconocimiento de Dígitos - MNIST</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/inter-ui@3.19.0/inter.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f0f0f;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        
        .canvas-wrapper {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }
        
        .canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        
        .canvas-container span {
            font-size: 0.75rem;
            color: #71717a;
        }
        
        canvas {
            border: 2px solid #27272a;
            border-radius: 8px;
            background: white;
            cursor: crosshair;
            image-rendering: pixelated;
            width: 280px;
            height: 280px;
            touch-action: none;
        }
        
        #debugCanvas {
            border-color: #a855f7;
        }
        
        .buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-primary {
            background: #a855f7;
            color: white;
            border: none;
        }
        
        .btn-primary:hover {
            background: #9333ea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }
        
        .btn-secondary {
            background: transparent;
            color: #a855f7;
            border: 2px solid #a855f7;
        }
        
        .btn-secondary:hover {
            background: #a855f7;
            color: white;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: transparent;
            color: #ef4444;
            border: 2px solid #ef4444;
        }
        
        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }
        
        .result {
            text-align: center;
            min-height: 80px;
        }
        
        .result-text {
            font-size: 2rem;
            font-weight: 700;
            color: #a855f7;
            margin-bottom: 0.5rem;
        }
        
        .result-confidence {
            font-size: 0.9rem;
            color: #71717a;
        }
        
        .probabilities {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 400px;
            margin-top: 0.75rem;
        }
        
        .prob-item {
            background: #18181b;
            border: 1px solid #27272a;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        
        .prob-item span {
            color: #a855f7;
            font-weight: 600;
        }
        
        .loading {
            color: #71717a;
            font-size: 0.9rem;
        }
        
        .error {
            color: #ef4444;
            font-size: 0.9rem;
        }
        
        .back-link {
            position: absolute;
            top: 1rem;
            left: 1rem;
            color: #71717a;
            text-decoration: none;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #a855f7;
        }
        
        .back-link svg {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.25rem;
            }

            .canvas-wrapper {
                flex-direction: column;
                gap: 0.75rem;
            }

            canvas {
                width: 240px;
                height: 240px;
            }

            #debugCanvas {
                width: 80px;
                height: 80px;
            }

            .buttons {
                width: 100%;
            }

            button {
                flex: 1;
                min-width: 100px;
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            .probabilities {
                max-width: 300px;
            }

            .result-text {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 380px) {
            canvas {
                width: 200px;
                height: 200px;
            }

            #debugCanvas {
                width: 60px;
                height: 60px;
            }

            button {
                padding: 0.5rem 0.75rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <a href="../project.html?id=4" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Volver
    </a>
    
    <div class="container">
        <h1>Reconocimiento de Dígitos</h1>
        
        <div class="canvas-wrapper">
            <div class="canvas-container">
                <canvas id="canvas"></canvas>
                <span>Dibuja un número (0-9)</span>
            </div>
            <div class="canvas-container">
                <canvas id="debugCanvas"></canvas>
                <span>Procesamiento</span>
            </div>
        </div>
        
        <div class="buttons">
            <button class="btn-primary" id="btnPredecir">Predecir</button>
            <button class="btn-secondary" id="btnGuardar">Guardar datos</button>
            <button class="btn-danger" id="btnLimpiar">Limpiar</button>
        </div>
        
        <div class="result" id="resultado">
            <p class="loading">Cargando modelo...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const debugCanvas = document.getElementById('debugCanvas');
        const debugCtx = debugCanvas.getContext('2d');
        
        canvas.width = 280;
        canvas.height = 280;
        debugCanvas.width = 28;
        debugCanvas.height = 28;
        
        function limpiarCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, 280, 280);
            debugCtx.fillStyle = 'black';
            debugCtx.fillRect(0, 0, 28, 28);
        }
        limpiarCanvas();
        
        let dibujando = false;
        
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = 280 / rect.width;
            const scaleY = 280 / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }
        
        canvas.addEventListener('mousedown', (e) => {
            dibujando = true;
            dibujar(e);
        });
        canvas.addEventListener('mouseup', () => dibujando = false);
        canvas.addEventListener('mouseleave', () => dibujando = false);
        canvas.addEventListener('mousemove', dibujar);
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            dibujando = true;
            dibujar(e.touches[0]);
        });
        canvas.addEventListener('touchend', () => dibujando = false);
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            dibujar(e.touches[0]);
        });
        
        function dibujar(e) {
            if (!dibujando) return;
            const pos = getPos(e);
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 10, 0, Math.PI * 2);
            ctx.fill();
        }
        
        document.getElementById('btnLimpiar').addEventListener('click', () => {
            limpiarCanvas();
            document.getElementById('resultado').innerHTML = '<p class="loading">Listo para dibujar</p>';
        });
        
        document.getElementById('btnGuardar').addEventListener('click', () => {
            const input = getInput();
            const blob = new Blob([JSON.stringify(input)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'numero.json';
            a.click();
            URL.revokeObjectURL(url);
        });
        
        function getInput() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 28;
            tempCanvas.height = 28;
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCtx.fillStyle = 'white';
            tempCtx.fillRect(0, 0, 28, 28);
            tempCtx.drawImage(canvas, 0, 0, 28, 28);
            
            const data = tempCtx.getImageData(0, 0, 28, 28).data;
            let input = [];
            
            for (let i = 0; i < data.length; i += 4) {
                input.push(1 - (data[i] / 255));
            }
            
            return input;
        }
        
        function mostrarDebug(input) {
            const imgData = debugCtx.createImageData(28, 28);
            for (let i = 0; i < input.length; i++) {
                const val = Math.floor(input[i] * 255);
                imgData.data[i * 4] = val;
                imgData.data[i * 4 + 1] = val;
                imgData.data[i * 4 + 2] = val;
                imgData.data[i * 4 + 3] = 255;
            }
            debugCtx.putImageData(imgData, 0, 0);
        }
        
        let pyodide = null;
        
        async function initPyodide() {
            try {
                pyodide = await loadPyodide();
                await pyodide.loadPackage('numpy');
                
                const pythonCode = await fetch('inference.py').then(r => r.text());
                await pyodide.runPythonAsync(pythonCode);
                
                const weightsResponse = await fetch('weights.json');
                const weightsData = await weightsResponse.json();
                
                await pyodide.runPythonAsync(`
load_weights(
    ${JSON.stringify(weightsData.w1)},
    ${JSON.stringify(weightsData.w2)},
    ${JSON.stringify(weightsData.b1)},
    ${JSON.stringify(weightsData.b2)}
)
                `);
                
                document.getElementById('resultado').innerHTML = '<p class="loading">Listo para dibujar</p>';
                document.getElementById('btnPredecir').disabled = false;
            } catch (error) {
                console.error('Error cargando Pyodide:', error);
                document.getElementById('resultado').innerHTML = '<p class="error">Error al cargar: ' + error.message + '</p>';
            }
        }
        
        document.getElementById('btnPredecir').disabled = true;
        
        document.getElementById('btnPredecir').addEventListener('click', async () => {
            if (!pyodide) {
                document.getElementById('resultado').innerHTML = '<p class="loading">Cargando modelo...</p>';
                return;
            }
            
            try {
                const input = getInput();
                mostrarDebug(input);
                
                pyodide.globals.set('input_data', pyodide.toPy(input));
                
                const resultJSON = await pyodide.runPythonAsync(`
import json
result = predict(input_data)
json.dumps({
    'digit': int(result['digit']),
    'confidence': float(result['confidence']),
    'probabilities': [float(p) for p in result['probabilities']]
})
                `);
                
                const data = JSON.parse(resultJSON);
                
                let probsHTML = '<div class="probabilities">';
                data.probabilities.forEach((p, i) => {
                    const isTop = i === data.digit;
                    probsHTML += '<div class="prob-item"' + (isTop ? ' style="border-color: #a855f7;"' : '') + '>' + i + ': <span>' + (p * 100).toFixed(1) + '%</span></div>';
                });
                probsHTML += '</div>';
                
                document.getElementById('resultado').innerHTML = 
                    '<p class="result-text">' + data.digit + '</p>' +
                    '<p class="result-confidence">Confianza: ' + (data.confidence * 100).toFixed(1) + '%</p>' +
                    probsHTML;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('resultado').innerHTML = '<p class="error">Error: ' + error.message + '</p>';
            }
        });
        
        initPyodide();
    </script>
</body>
</html>
